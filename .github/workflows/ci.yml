name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Python Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke test
        run: |
          python - <<'PY'
          import glob
          import subprocess
          import sys

          cmd = [sys.executable, "main.py", "--url", "https://example.com"]
          result = subprocess.run(cmd, check=False)
          if result.returncode != 0:
              raise SystemExit(result.returncode)

          files = glob.glob("qr_codes/QRCode_*.png")
          if not files:
              raise SystemExit("No QR code output file was generated.")

          print(f"Generated {len(files)} QR image(s).")
          PY

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: module7-is601:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
